openapi: 3.0.3
info:
  version: 0.1.0
  title: Balances Watcher
  description: |
    Real-time ERC20 balance tracking service for EVM chains.

    The service is **chain-scoped**: one process serves exactly one network.
    The `{chain_id}` path segment is validated against the instance's
    configured `NETWORK` and rejected with `404 Not Found` if mismatched.

    Typical client flow:

    1. `POST /{chain_id}/sessions/{owner}` — create a session and spawn the
       per-session watchers.
    2. `GET  /sse/{chain_id}/balances/{owner}` — open the Server-Sent
       Events stream. The first message is the full snapshot, every
       subsequent message is a diff (only changed balances).
    3. `PUT  /{chain_id}/sessions/{owner}` — replace the watched token list
       (this is a full replace, not extend; tokens absent from the new list
       are evicted).

    Native balances (ETH on Ethereum, BNB on BSC, …) are intentionally not
    tracked. The native sentinel `0xEee…EEeE` is silently dropped from the
    watched set if a client supplies it.
  contact:
    name: balances-watcher
    url: https://github.com/cowprotocol/balances-watcher
  license:
    name: MIT

servers:
  - description: Local dev (docker-compose via Traefik)
    url: http://localhost:4000

tags:
  - name: sessions
    description: Create / replace watched-token sessions.
  - name: streaming
    description: Server-Sent Events delivering balance diffs.
  - name: health
    description: Active liveness probe.

paths:
  /health:
    get:
      tags: [health]
      summary: Active health probe.
      description: |
        Calls `eth_blockNumber` on the upstream HTTP RPC. Used by k8s
        readiness / liveness probes — no internal retries, transient
        flakiness is absorbed by the probe's `failureThreshold`.
      responses:
        "200":
          description: Upstream RPC reachable; this instance is serving.
        "503":
          description: Upstream RPC unreachable or this instance unhealthy.

  /{chain_id}/sessions/{owner}:
    post:
      tags: [sessions]
      summary: Create a session.
      description: |
        Creates a watcher session for `owner` on `chain_id` and spawns the
        per-session background tasks (snapshot updater, ERC20 / WETH9 log
        listeners, balance refresh queue). Must be called before the SSE
        stream is opened.

        If the session already exists, this behaves like `PUT` —
        the watched token list is **replaced** with the resolved list from
        the request (token lists + `customTokens` + WETH9).
      parameters:
        - $ref: "#/components/parameters/ChainId"
        - $ref: "#/components/parameters/Owner"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "200":
          description: Session created or watched list replaced if it already existed.
        "400":
          description: Empty token lists or token limit exceeded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorBody" }
        "404":
          description: chain_id does not match this instance's NETWORK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorBody" }

    put:
      tags: [sessions]
      summary: Replace the watched token list.
      description: |
        Sets the session's watched token list to **exactly** the resolved
        list (token lists + `customTokens` + WETH9). Tokens previously
        watched but absent from the new request are dropped from the
        watched set, and their cached balance entries are evicted so SSE
        clients stop receiving stale data for them.

        The `400 Bad Request` token-limit check applies to the **new**
        list, not to the union with the previous one — clients can freely
        rotate token lists without hitting the limit as long as each
        individual request stays under it.
      parameters:
        - $ref: "#/components/parameters/ChainId"
        - $ref: "#/components/parameters/Owner"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSessionRequest" }
      responses:
        "200":
          description: Watched token list replaced.
        "400":
          description: Empty body or new list exceeds the per-session token limit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorBody" }
        "404":
          description: chain_id mismatch or session not created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorBody" }

  /sse/{chain_id}/balances/{owner}:
    get:
      tags: [streaming]
      summary: Open the SSE balance stream.
      description: |
        Long-lived Server-Sent Events stream. The first message is the
        full balance snapshot, every subsequent message is a diff
        containing only changed balances.

        Event types:

        - `balance_update` — JSON `{ "balances": { "<address>": "<amount>" } }`.
          Amounts are decimal strings (no fixed-point conversion applied).
        - `error` — terminal error, JSON `{ "code": <u16>, "message": "<str>" }`.
          The stream closes after this event; the client should reconnect.

        Requires that a session has already been created via
        `POST /{chain_id}/sessions/{owner}` — otherwise responds with 404.
      parameters:
        - $ref: "#/components/parameters/ChainId"
        - $ref: "#/components/parameters/Owner"
      responses:
        "200":
          description: SSE stream opened successfully.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE wire format. Each event is one of:

                  ```
                  event: balance_update
                  data: {"balances":{"0xC02a...":"1000000000000000000"}}

                  event: error
                  data: {"code":503,"message":"RPC provider connection lost permanently"}
                  ```
        "404":
          description: chain_id mismatch or session not created.

components:
  parameters:
    ChainId:
      name: chain_id
      in: path
      required: true
      description: EVM chain id. Must match the instance's configured `NETWORK`.
      schema:
        type: integer
        format: int64
        example: 1
    Owner:
      name: owner
      in: path
      required: true
      description: 0x-prefixed EVM address (20 bytes).
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
        example: "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"

  schemas:
    CreateSessionRequest:
      type: object
      properties:
        tokensListsUrls:
          type: array
          description: |
            HTTPS URLs of token-list JSON files (Uniswap-style
            `tokens.json`). At least one of `tokensListsUrls` or
            `customTokens` must be non-empty.
          items:
            type: string
            format: uri
          example:
            - "https://tokens.coingecko.com/uniswap/all.json"
        customTokens:
          type: array
          description: Extra ERC20 addresses to watch beyond the token lists.
          items:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          example:
            - "0xdAC17F958D2ee523a2206206994597C13D831ec7"
      required: []

    UpdateSessionRequest:
      type: object
      description: |
        Same shape as `CreateSessionRequest`. At least one of
        `tokensListsUrls` or `customTokens` must be non-empty.
      properties:
        tokensListsUrls:
          type: array
          items:
            type: string
            format: uri
          example:
            - "https://tokens.coingecko.com/uniswap/all.json"
        customTokens:
          type: array
          items:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          example:
            - "0xdAC17F958D2ee523a2206206994597C13D831ec7"
      required: []

    ErrorBody:
      type: object
      description: Error envelope used by all 4xx / 5xx JSON responses.
      properties:
        code:
          type: integer
          format: int32
          description: Mirrors the HTTP status code.
          example: 400
        message:
          type: string
          description: Human-readable explanation; safe to surface to end users.
          example: "Bad request: tokens_lists_urls or custom_tokens should not be empty both"
      required:
        - code
        - message
