apiVersion: apps/v1
kind: Deployment
metadata:
  name: balances-watcher-${NETWORK_NAME}
  labels:
    app: balances-watcher
    network: ${NETWORK_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: balances-watcher
      network: ${NETWORK_NAME}
  template:
    metadata:
      labels:
        app: balances-watcher
        network: ${NETWORK_NAME}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ${IMAGE_REF}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: balances-watcher-secrets
          env:
            - name: NETWORK
              value: "${NETWORK}"
            - name: RUST_LOG
              value: "${RUST_LOG}"
            - name: HTTP_BIND
              value: "${HTTP_BIND}"
            - name: ALLOWED_ORIGINS
              value: "${ALLOWED_ORIGINS}"
          resources:
            requests: { memory: "32Mi", cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "500m" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5  
