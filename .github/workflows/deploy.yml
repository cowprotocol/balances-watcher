name: deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags/labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pick image ref for Trivy
        id: scan_ref
        run: |
          REF=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.scan_ref.outputs.ref }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Resolve image tag for k8s manifests
        id: tag
        run: |
          REF=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)
          TAG="${REF##*:}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      - name: Render manifests
        run: |
          set -e
          mkdir -p ./k8s-output

          cp .github/k8s/cluster-issuer.yaml   ./k8s-output/
          cp .github/k8s/ingress.yaml          ./k8s-output/
          cp .github/k8s/service-monitor.yaml  ./k8s-output/
          # per-chain: one deployment + service each
          # add / remove chains by editing the list below.
          # keep .github/k8s/ingress.yaml in sync with this list.
          # format: "network_name:chain_id"
          for entry in \
              "eth:1" \
              "arb:42161" \
              "sepolia:11155111"; do
            export NETWORK_NAME="${entry%%:*}"
            export NETWORK="${entry##*:}"
            envsubst < .github/k8s/deployment.yaml > "./k8s-output/dep-${NETWORK_NAME}.yaml"
            envsubst < .github/k8s/service.yaml    > "./k8s-output/svc-${NETWORK_NAME}.yaml"
          done

          ls -la ./k8s-output/
        env:
          IMAGE_TAG:       ${{ steps.tag.outputs.tag }}
          RUST_LOG:        ${{ vars.RUST_LOG }}
          HTTP_BIND:       ${{ vars.HTTP_BIND }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}

      - name: Copy manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "k8s-output/*"
          target: "/tmp/k8s-manifests"
          strip_components: 1

      - name: Apply manifests
        uses: appleboy/ssh-action@v1.0.3
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ALCHEMY_API_KEY
          script: |
            set -e
            export KUBECONFIG=/home/limitofzero/.kube/config

            kubectl create secret generic balances-watcher-secrets \
              --from-literal=ALCHEMY_API_KEY=$ALCHEMY_API_KEY \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -f /tmp/k8s-manifests/cluster-issuer.yaml
            kubectl apply -f /tmp/k8s-manifests/service-monitor.yaml

            for f in /tmp/k8s-manifests/dep-*.yaml /tmp/k8s-manifests/svc-*.yaml; do
              echo "applying $f"
              kubectl apply -f "$f"
            done

            kubectl apply -f /tmp/k8s-manifests/ingress.yaml

            kubectl delete deployment balances-watcher --ignore-not-found=true
            kubectl delete service    balances-watcher --ignore-not-found=true

            for dep in /tmp/k8s-manifests/dep-*.yaml; do
              name=$(grep '^  name:' "$dep" | head -1 | awk '{print $2}')
              echo "waiting for deployment/$name"
              kubectl rollout status "deployment/$name" --timeout=120s
            done
