name: build-image

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags/labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{env.REGISTRY}}/${{env.IMAGE_NAME}}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on master)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pick image ref for Trivy
        id: scan_ref
        run: |
          # docker/metadata-action emits a newline-separated list of tags;
          # any one of them refers to the same image we just built, so take
          # the first.
          REF=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Scanning: $REF"

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.scan_ref.outputs.ref }}
          # fail the build only on CRITICAL/HIGH issues that have an available
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table