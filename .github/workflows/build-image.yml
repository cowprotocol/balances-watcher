name: Build Image

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags/labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Tag & Release Image
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # Guard against re-runs / no-op merges: if the current HEAD is already
      # at the latest tag (typical for "Re-run job" or a revert-followed-by-
      # re-apply merge), skip the whole bump/tag/push chain. Without this
      # guard we'd tag the same SHA twice with two different versions.
      - name: Check for changes since last tag
        id: changes
        run: |
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "detected=true" >> "$GITHUB_OUTPUT"
            echo "No previous tag — bootstrapping first release."
          elif git diff --quiet "$LATEST..HEAD"; then
            echo "detected=false" >> "$GITHUB_OUTPUT"
            echo "No commits since $LATEST — skipping release."
          else
            echo "detected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.changes.outputs.detected == 'true'
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\..*/\1/')
            echo "tag=v${MAJOR}.$((MINOR + 1)).0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.changes.outputs.detected == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Login to GHCR
        if: steps.changes.outputs.detected == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image with semver
        if: steps.changes.outputs.detected == 'true'
        run: |
          SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          VERSION="${{ steps.version.outputs.tag }}"
          MINOR=$(echo "$VERSION" | grep -oP 'v\d+\.\d+')

          docker pull "$SHA_TAG"
          docker tag "$SHA_TAG" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          docker tag "$SHA_TAG" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MINOR}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MINOR}"
